<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 QR코드 생성기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome (아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Code 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="py-8 px-4 sm:px-6 lg:px-8 flex items-center justify-center">

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row animate-fade-in">
        <!-- 설정 영역 (좌측) -->
        <div class="w-full md:w-3/5 p-6 sm:p-8 border-r border-gray-100">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg shadow-indigo-200">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800 tracking-tight">QR Code Maker</h1>
                    <p class="text-xs text-gray-500">나만의 커스텀 QR코드를 쉽고 빠르게 만드세요</p>
                </div>
            </div>

            <!-- 입력 탭 선택 (텍스트/URL, 와이파이, 이메일) -->
            <div class="flex border-b border-gray-100 mb-6 text-sm">
                <button onclick="switchTab('text')" id="tab-text" class="flex-1 pb-3 text-center font-medium border-b-2 border-indigo-600 text-indigo-600 transition-all">
                    <i class="fa-solid fa-link mr-1"></i> URL / 텍스트
                </button>
                <button onclick="switchTab('wifi')" id="tab-wifi" class="flex-1 pb-3 text-center font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
                    <i class="fa-solid fa-wifi mr-1"></i> Wi-Fi 연결
                </button>
                <button onclick="switchTab('email')" id="tab-email" class="flex-1 pb-3 text-center font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all">
                    <i class="fa-solid fa-envelope mr-1"></i> 이메일
                </button>
            </div>

            <!-- 입력 폼 컨테이너 -->
            <div class="space-y-5">
                <!-- 1. 일반 텍스트/URL 폼 -->
                <div id="form-text" class="tab-content">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">대상 URL 또는 텍스트 입력</label>
                    <input type="text" id="qr-text" placeholder="https://example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none text-gray-700" oninput="triggerAutoGenerate()">
                </div>

                <!-- 2. 와이파이 폼 -->
                <div id="form-wifi" class="tab-content hidden space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">와이파이 이름 (SSID)</label>
                        <input type="text" id="wifi-ssid" placeholder="내 와이파이 이름" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-gray-700" oninput="triggerAutoGenerate()">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">비밀번호</label>
                            <input type="password" id="wifi-pass" placeholder="비밀번호" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-gray-700" oninput="triggerAutoGenerate()">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">보안 방식</label>
                            <select id="wifi-type" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-gray-700" onchange="triggerAutoGenerate()">
                                <option value="WPA">WPA/WPA2</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">보안 없음 (Open)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 3. 이메일 폼 -->
                <div id="form-email" class="tab-content hidden space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">수신자 이메일 주소</label>
                        <input type="email" id="email-to" placeholder="example@email.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-gray-700" oninput="triggerAutoGenerate()">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">이메일 제목</label>
                        <input type="text" id="email-subject" placeholder="메일 제목" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-gray-700" oninput="triggerAutoGenerate()">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">이메일 내용</label>
                        <textarea id="email-body" rows="3" placeholder="메일 내용을 작성하세요" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-gray-700" oninput="triggerAutoGenerate()"></textarea>
                    </div>
                </div>

                <hr class="border-gray-100 my-6">

                <!-- 커스터마이징 디자인 영역 -->
                <div>
                    <h3 class="text-sm font-bold text-gray-800 mb-4"><i class="fa-solid fa-wand-magic-sparkles text-indigo-500 mr-1"></i> QR코드 디자인 설정</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- QR 색상 -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-2">QR코드 색상</label>
                            <div class="flex items-center gap-2">
                                <input type="color" id="color-dark" value="#1e1b4b" class="w-10 h-10 rounded-lg cursor-pointer border border-gray-200" oninput="syncColorInput('dark', this.value)">
                                <input type="text" id="color-dark-text" value="#1E1B4B" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 uppercase outline-none text-gray-700" oninput="syncColorInput('dark', this.value)">
                            </div>
                        </div>

                        <!-- 배경 색상 -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-2">배경 색상</label>
                            <div class="flex items-center gap-2">
                                <input type="color" id="color-light" value="#ffffff" class="w-10 h-10 rounded-lg cursor-pointer border border-gray-200" oninput="syncColorInput('light', this.value)">
                                <input type="text" id="color-light-text" value="#FFFFFF" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 uppercase outline-none text-gray-700" oninput="syncColorInput('light', this.value)">
                            </div>
                        </div>

                        <!-- 크기 및 여백 조절 -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">품질 / 크기 (픽셀)</label>
                            <select id="qr-size" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 outline-none text-gray-700" onchange="generateQRCode()">
                                <option value="200">200 x 200 (소형)</option>
                                <option value="400" selected>400 x 400 (기본)</option>
                                <option value="600">600 x 600 (대형)</option>
                                <option value="1000">1000 x 1000 (고해상도)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">오류 복구 수준 (ECC)</label>
                            <select id="qr-ecc" class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 outline-none text-gray-700" onchange="generateQRCode()">
                                <option value="L">L (7% 복구 가능)</option>
                                <option value="M">M (15% 복구 가능)</option>
                                <option value="Q">Q (25% 복구 가능)</option>
                                <option value="H" selected>H (30% 복구 가능 - 로고 사용 권장)</option>
                            </select>
                        </div>
                    </div>

                    <!-- 중앙 로고 추가 옵션 -->
                    <div class="mt-4">
                        <label class="block text-xs font-semibold text-gray-500 mb-2">중앙 아이콘 / 로고 추가 (선택)</label>
                        <div class="grid grid-cols-5 gap-2">
                            <button type="button" id="logo-btn-none" onclick="setLogo('none')" class="logo-btn border-2 border-indigo-500 bg-indigo-50 p-2 rounded-xl text-xs font-bold text-gray-700 flex flex-col items-center justify-center h-14 transition-all">
                                <span class="text-xs">없음</span>
                            </button>
                            <button type="button" id="logo-btn-link" onclick="setLogo('link')" class="logo-btn border border-gray-200 bg-white hover:border-indigo-200 p-2 rounded-xl text-gray-600 flex flex-col items-center justify-center h-14 transition-all">
                                <i class="fa-solid fa-link text-lg text-blue-500"></i>
                                <span class="text-[10px] mt-1">링크</span>
                            </button>
                            <button type="button" id="logo-btn-wifi" onclick="setLogo('wifi')" class="logo-btn border border-gray-200 bg-white hover:border-indigo-200 p-2 rounded-xl text-gray-600 flex flex-col items-center justify-center h-14 transition-all">
                                <i class="fa-solid fa-wifi text-lg text-emerald-500"></i>
                                <span class="text-[10px] mt-1">WIFI</span>
                            </button>
                            <button type="button" id="logo-btn-email" onclick="setLogo('email')" class="logo-btn border border-gray-200 bg-white hover:border-indigo-200 p-2 rounded-xl text-gray-600 flex flex-col items-center justify-center h-14 transition-all">
                                <i class="fa-solid fa-envelope text-lg text-red-500"></i>
                                <span class="text-[10px] mt-1">메일</span>
                            </button>
                            <button type="button" id="logo-btn-custom" onclick="triggerLogoUpload()" class="logo-btn border border-gray-200 bg-white hover:border-indigo-200 p-2 rounded-xl text-gray-600 flex flex-col items-center justify-center h-14 transition-all">
                                <i class="fa-solid fa-upload text-lg text-indigo-500"></i>
                                <span class="text-[10px] mt-1" id="custom-logo-text">업로드</span>
                            </button>
                        </div>
                        <input type="file" id="logo-file" accept="image/*" class="hidden" onchange="handleLogoUpload(this)">
                        <p id="logo-filename" class="text-[11px] text-gray-400 mt-2 hidden text-center bg-gray-50 py-1 rounded-md border border-dashed border-gray-200"></p>
                    </div>
                </div>

                <!-- 생성 버튼 -->
                <button onclick="generateQRCode()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-6 rounded-2xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center gap-2 mt-2">
                    <i class="fa-solid fa-arrows-rotate animate-spin-hover"></i> QR코드 새로고침 및 생성
                </button>
            </div>
        </div>

        <!-- 결과 및 다운로드 영역 (우측) -->
        <div class="w-full md:w-2/5 bg-gray-50 p-6 sm:p-8 flex flex-col items-center justify-between min-h-[400px]">
            <div class="text-center w-full">
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-6">실시간 프리뷰</h2>
                
                <!-- QR코드 뷰어 -->
                <div class="relative bg-white p-6 rounded-3xl shadow-md border border-gray-100 mx-auto w-52 h-52 sm:w-60 sm:h-60 flex items-center justify-center group overflow-hidden">
                    <canvas id="qr-canvas" class="max-w-full max-h-full"></canvas>
                    <div id="no-data" class="absolute inset-0 bg-gray-50 flex flex-col items-center justify-center p-4 text-center">
                        <i class="fa-solid fa-qrcode text-4xl text-gray-300 mb-2 animate-pulse"></i>
                        <span class="text-sm font-medium text-gray-400">데이터를 입력하면<br>QR코드가 생성됩니다</span>
                    </div>
                </div>

                <div id="data-preview-box" class="mt-4 text-xs text-gray-500 truncate max-w-xs mx-auto bg-gray-100 py-1.5 px-3 rounded-full hidden">
                    입력된 내용: <span id="data-preview-text" class="font-mono text-gray-700"></span>
                </div>
            </div>

            <!-- 다운로드 및 부가기능 -->
            <div class="w-full space-y-3 mt-6">
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-download-png" onclick="downloadQR('png')" disabled class="w-full bg-emerald-500 hover:bg-emerald-600 disabled:bg-gray-200 disabled:cursor-not-allowed text-white font-semibold py-3 px-4 rounded-xl shadow-md shadow-emerald-100 transition-all flex items-center justify-center gap-1.5 text-sm">
                        <i class="fa-solid fa-file-image"></i> PNG 저장
                    </button>
                    <button id="btn-copy" onclick="copyQRToClipboard()" disabled class="w-full bg-amber-500 hover:bg-amber-600 disabled:bg-gray-200 disabled:cursor-not-allowed text-white font-semibold py-3 px-4 rounded-xl shadow-md shadow-amber-100 transition-all flex items-center justify-center gap-1.5 text-sm">
                        <i class="fa-solid fa-copy"></i> 복사하기
                    </button>
                </div>
                
                <!-- 알림 메시지 영역 -->
                <div id="alert-box" class="hidden text-center text-xs py-2 px-3 rounded-lg bg-green-50 text-green-700 border border-green-200 transition-all animate-bounce"></div>
            </div>
        </div>
    </div>

    <!-- 스크립트 제어 코드 -->
    <script>
        let currentTab = 'text';
        let selectedLogoType = 'none'; // 'none', 'link', 'wifi', 'email', 'custom'
        let customLogoImage = null;
        let autoGenerateTimer = null;

        // 컬러 피커 및 텍스트 싱크 처리
        function syncColorInput(type, val) {
            const picker = document.getElementById(`color-${type}`);
            const text = document.getElementById(`color-${type}-text`);
            
            if (val.startsWith('#') && val.length === 7) {
                picker.value = val;
                text.value = val.toUpperCase();
            } else if (!val.startsWith('#') && val.length === 6) {
                picker.value = '#' + val;
                text.value = '#' + val.toUpperCase();
            } else {
                picker.value = val;
                text.value = val.toUpperCase();
            }
            triggerAutoGenerate();
        }

        // 탭 스위칭 함수
        function switchTab(tabId) {
            currentTab = tabId;
            
            // 모든 탭 버튼 스타일 초기화
            const tabs = ['text', 'wifi', 'email'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = "flex-1 pb-3 text-center font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-all";
                
                const form = document.getElementById(`form-${t}`);
                form.classList.add('hidden');
            });

            // 선택된 탭 스타일 지정 및 폼 노출
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.className = "flex-1 pb-3 text-center font-medium border-b-2 border-indigo-600 text-indigo-600 transition-all";
            
            const activeForm = document.getElementById(`form-${tabId}`);
            activeForm.classList.remove('hidden');

            // 탭에 따라 센스 있는 기본 로고 추천
            if (selectedLogoType === 'none' || selectedLogoType === 'link' || selectedLogoType === 'wifi' || selectedLogoType === 'email') {
                if (tabId === 'text') setLogo('none');
                else if (tabId === 'wifi') setLogo('wifi');
                else if (tabId === 'email') setLogo('email');
            } else {
                generateQRCode();
            }
        }

        // 로고 유형 선택 버튼 액션
        function setLogo(logoType) {
            selectedLogoType = logoType;
            
            // 디자인 버튼 상태 토글
            const buttons = ['none', 'link', 'wifi', 'email', 'custom'];
            buttons.forEach(b => {
                const btn = document.getElementById(`logo-btn-${b}`);
                btn.className = "logo-btn border border-gray-200 bg-white hover:border-indigo-200 p-2 rounded-xl text-gray-600 flex flex-col items-center justify-center h-14 transition-all";
            });

            const activeBtn = document.getElementById(`logo-btn-${logoType}`);
            activeBtn.className = "logo-btn border-2 border-indigo-500 bg-indigo-50 p-2 rounded-xl text-xs font-bold text-gray-800 flex flex-col items-center justify-center h-14 transition-all";

            if (logoType !== 'custom') {
                document.getElementById('logo-filename').classList.add('hidden');
            } else if (customLogoImage) {
                document.getElementById('logo-filename').classList.remove('hidden');
            }

            generateQRCode();
        }

        // 로고 파일 선택 트리거
        function triggerLogoUpload() {
            document.getElementById('logo-file').click();
        }

        // 파일 업로드 핸들링
        function handleLogoUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        customLogoImage = img;
                        const filenameText = document.getElementById('logo-filename');
                        filenameText.textContent = `업로드됨: ${file.name.substring(0, 15)}${file.name.length > 15 ? '...' : ''}`;
                        filenameText.classList.remove('hidden');
                        document.getElementById('custom-logo-text').textContent = "변경";
                        setLogo('custom');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        // 입력 값에 따라 생성될 실제 데이터 가공
        function getQRTargetData() {
            if (currentTab === 'text') {
                return document.getElementById('qr-text').value.trim();
            } else if (currentTab === 'wifi') {
                const ssid = document.getElementById('wifi-ssid').value.trim();
                const pass = document.getElementById('wifi-pass').value.trim();
                const type = document.getElementById('wifi-type').value;
                if (!ssid) return '';
                return `WIFI:S:${ssid};T:${type};P:${pass};;`;
            } else if (currentTab === 'email') {
                const to = document.getElementById('email-to').value.trim();
                const subject = encodeURIComponent(document.getElementById('email-subject').value.trim());
                const body = encodeURIComponent(document.getElementById('email-body').value.trim());
                if (!to) return '';
                return `mailto:${to}?subject=${subject}&body=${body}`;
            }
            return '';
        }

        // 디바운스를 활용한 실시간 자동 생성 처리
        function triggerAutoGenerate() {
            if (autoGenerateTimer) clearTimeout(autoGenerateTimer);
            autoGenerateTimer = setTimeout(() => {
                generateQRCode();
            }, 300);
        }

        // 알림 전용 팝업 메시지 노출 (alert 대용)
        function showAlert(msg, status = 'success') {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = msg;
            alertBox.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'border-green-200', 'bg-red-50', 'text-red-700', 'border-red-200');
            
            if (status === 'success') {
                alertBox.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
            } else {
                alertBox.classList.add('bg-red-50', 'text-red-700', 'border-red-200');
            }
            
            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 3000);
        }

        // QR 코드 생성 메인 로직
        function generateQRCode() {
            const data = getQRTargetData();
            const canvas = document.getElementById('qr-canvas');
            const noData = document.getElementById('no-data');
            const dataPreviewBox = document.getElementById('data-preview-box');
            const dataPreviewText = document.getElementById('data-preview-text');
            
            const btnDownloadPng = document.getElementById('btn-download-png');
            const btnCopy = document.getElementById('btn-copy');

            if (!data) {
                noData.classList.remove('hidden');
                dataPreviewBox.classList.add('hidden');
                btnDownloadPng.disabled = true;
                btnCopy.disabled = true;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            noData.classList.add('hidden');
            dataPreviewBox.classList.remove('hidden');
            dataPreviewText.textContent = data.length > 30 ? data.substring(0, 30) + '...' : data;

            const size = parseInt(document.getElementById('qr-size').value);
            const ecc = document.getElementById('qr-ecc').value;
            const darkColor = document.getElementById('color-dark').value;
            const lightColor = document.getElementById('color-light').value;

            const qrOptions = {
                errorCorrectionLevel: ecc,
                width: size,
                margin: 2,
                color: {
                    dark: darkColor,
                    light: lightColor
                }
            };

            QRCode.toCanvas(canvas, data, qrOptions, function (error) {
                if (error) {
                    console.error(error);
                    showAlert('QR코드 생성 중 오류가 발생했습니다. 더 높은 등급의 복구수준(ECC)을 선택하세요.', 'error');
                    return;
                }

                // 중앙 로고 합성 작업 처리
                if (selectedLogoType !== 'none') {
                    drawLogoOnQR(canvas, size, darkColor, lightColor);
                } else {
                    btnDownloadPng.disabled = false;
                    btnCopy.disabled = false;
                }
            });
        }

        // 아이콘/로고 합성용 그리기 함수
        function drawLogoOnQR(canvas, qrSize, darkColor, lightColor) {
            const ctx = canvas.getContext('2d');
            
            // 로고 영역의 크기 결정 (가로세로의 약 22% 사이즈)
            const logoSize = qrSize * 0.22;
            const x = (qrSize - logoSize) / 2;
            const y = (qrSize - logoSize) / 2;
            const radius = logoSize * 0.22; // 배경 라운딩 값

            // 1. 로고 배경 그리기 (둥근 사각형)
            ctx.save();
            ctx.fillStyle = lightColor;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + logoSize - radius, y);
            ctx.quadraticCurveTo(x + logoSize, y, x + logoSize, y + radius);
            ctx.lineTo(x + logoSize, y + logoSize - radius);
            ctx.quadraticCurveTo(x + logoSize, y + logoSize, x + logoSize - radius, y + logoSize);
            ctx.lineTo(x + radius, y + logoSize);
            ctx.quadraticCurveTo(x, y + logoSize, x, y + logoSize - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();

            // 배경 테두리선 살짝 추가
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 2. 내부 로고 그리기 (사용자 설정에 맞춰)
            if (selectedLogoType === 'custom' && customLogoImage) {
                // 사용자가 업로드한 커스텀 로고 이미지 그리기
                const innerPadding = logoSize * 0.15;
                const innerSize = logoSize - (innerPadding * 2);
                ctx.drawImage(customLogoImage, x + innerPadding, y + innerPadding, innerSize, innerSize);
                finishLogoDrawing();
            } else {
                // 폰트어썸 아이콘을 텍스트/그림 형태로 Canvas에 렌더링하기
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let iconChar = '';
                let iconColor = '#4f46e5';
                
                if (selectedLogoType === 'link') {
                    iconChar = '\uf0c1'; // link icon
                    iconColor = '#3b82f6';
                } else if (selectedLogoType === 'wifi') {
                    iconChar = '\uf1eb'; // wifi icon
                    iconColor = '#10b981';
                } else if (selectedLogoType === 'email') {
                    iconChar = '\uf0e0'; // envelope icon
                    iconColor = '#ef4444';
                }

                // 폰트 설정 후 아이콘 그리기 (FontAwesome이 완전히 로드된 이후 정상 출력)
                ctx.font = `900 ${logoSize * 0.5}px "Font Awesome 6 Free"`;
                ctx.fillStyle = iconColor;
                ctx.fillText(iconChar, x + (logoSize / 2), y + (logoSize / 2));
                finishLogoDrawing();
            }

            function finishLogoDrawing() {
                ctx.restore();
                document.getElementById('btn-download-png').disabled = false;
                document.getElementById('btn-copy').disabled = false;
            }
        }

        // 이미지(PNG) 다운로드 기능
        function downloadQR(format) {
            const canvas = document.getElementById('qr-canvas');
            const dataUrl = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = `qrcode_${Date.now()}.png`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showAlert('QR코드가 이미지(PNG)로 성공적으로 저장되었습니다!');
        }

        // 클립보드 복사 기능 구현 (navigator.clipboard의 iframe 제한 이슈 방지용 fallback 포함)
        function copyQRToClipboard() {
            const canvas = document.getElementById('qr-canvas');
            
            try {
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        showAlert('복사할 데이터를 생성하지 못했습니다.', 'error');
                        return;
                    }
                    
                    // Clipboard API를 사용하여 이미지 복사 시도
                    try {
                        const item = new ClipboardItem({ 'image/png': blob });
                        navigator.clipboard.write([item]).then(() => {
                            showAlert('QR코드가 클립보드에 복사되었습니다! (원하는 곳에 붙여넣기 하세요)');
                        }).catch(err => {
                            fallbackCopyText();
                        });
                    } catch (e) {
                        fallbackCopyText();
                    }
                }, 'image/png');
            } catch (err) {
                fallbackCopyText();
            }

            function fallbackCopyText() {
                // 이미지를 직접 복사하지 못하는 환경에서는 데이터 텍스트(URL) 복사 제공
                const textVal = getQRTargetData();
                const tempInput = document.createElement('input');
                tempInput.value = textVal;
                document.body.appendChild(tempInput);
                tempInput.select();
                try {
                    document.execCommand('copy');
                    showAlert('이미지 직접 복사가 제한되어 입력된 텍스트가 대신 복사되었습니다.', 'success');
                } catch (e) {
                    showAlert('클립보드 복사를 지원하지 않는 환경입니다.', 'error');
                }
                document.body.removeChild(tempInput);
            }
        }

        // 웹페이지 초기 설정 및 예시 코드 자동 생성
        window.onload = function() {
            document.getElementById('qr-text').value = "https://example.com";
            generateQRCode();
        }
    </script>
